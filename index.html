<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>LeetCode 个人题库</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f6f8fa; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; color: #24292f; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 16px 0; }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; background: #e1e4e8; }
    .btn.active { background: #238636; color: white; }
    .problem { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px #00000012; display: flex; justify-content: space-between; align-items: center; }
    .title { font-weight: 600; }
    .tag { color: #6a737d; font-size: 12px; margin-left: 8px; }
    .status { font-size: 16px; margin-left: 8px; }
  </style>
</head>
<body>

<div class="container">
  <h1>LeetCode 个人刷题进度</h1>
  <div class="filters">
    <button class="btn" onclick="loadAll()">全部题目</button>
    <button class="btn" onclick="showDone()">已做</button>
    <button class="btn" onclick="showUndone()">未做</button>

  <div id="tags" class="filters"></div>
  <div id="list"></div>
</div>

const CSRF_TOKEN = "pW0ANtRb8dqzXlxRoXfyaB0LKOhLPW1p";
// ===============================================================

let allProblems = [];
let solvedSet = new Set();

async function loadData() {
  document.getElementById("list").innerText = "加载中...";

  const headers = {
    cookie: `LEETCODE_SESSION=${LEETCODE_SESSION}; csrftoken=${CSRF_TOKEN}`,
    "x-csrftoken": CSRF_TOKEN,
    referer: "https://leetcode.cn"
  };

  // 获取已AC题目
  const res = await fetch("https://leetcode.cn/api/progress/all/", { headers });
  const data = await res.json();
  solvedSet = new Set(data.acedQuestionIds);

  // 获取所有题目
  const allRes = await fetch("https://leetcode.cn/api/problems/all/", { headers });
  const allData = await allRes.json();

  allProblems = allData.stat_status_pairs.map(item => ({
    id: item.stat.question_id,
    title: item.stat.question__title,
    slug: item.stat.question__title_slug,
    done: solvedSet.has(item.stat.question_id)
  }));

  render(allProblems);
  makeTags();
}

function render(list) {
  const dom = document.getElementById("list");
  dom.innerHTML = "";
  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "problem";
    div.innerHTML = `
      <div>
        <span class="title">${p.id}. ${p.title}</span>
      </div>
      <div>
        <span class="status">${p.done ? "✅" : "❌"}</span>
      </div>
    `;
    dom.appendChild(div);
  });
}

function loadAll() { render(allProblems); }
function showDone() { render(allProblems.filter(p => p.done)); }
function showUndone() { render(allProblems.filter(p => !p.done)); }
function makeTags() { /* 下期加标签筛选 */ }

loadData();
</script>
</body>
</html>
