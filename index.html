<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法题库</title>
  <style>
    body{font-family:Arial;background:#f6f8fa;padding:20px;}
    .container{max-width:900px;margin:0 auto;}
    h1{text-align:center;}
    #tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;}
    .tag-btn{padding:8px 14px;border:none;border-radius:6px;background:#e1e4e8;cursor:pointer;}
    .tag-btn.active{background:#238636;color:white;}
    .problem{background:white;padding:12px;border-radius:6px;margin-bottom:8px;box-shadow:0 1px 2px #00000010;}
  </style>
</head>
<body>
  <div class="container">
    <h1>LC + CF 题库</h1>
    <div id="tags"></div>
    <div id="problem-list"></div>
  </div>

  <script>
    const problems = [
      { id: 136, title: "只出现一次的数字", tag: "位运算", platform: "LC" },
      { id: 461, title: "汉明距离", tag: "位运算", platform: "LC" },
      { id: 704, title: "二分查找", tag: "二分", platform: "LC" },
      { id: 300, title: "最长上升子序列", tag: "DP", platform: "LC" },
    ];

    function buildTags() {
      let tags = new Set();
      problems.forEach(p => tags.add(p.tag));
      const container = document.getElementById("tags");
      const allBtn = document.createElement("button");
      allBtn.className = "tag-btn active";
      allBtn.innerText = "全部";
      allBtn.onclick = () => { showAll(); setActive("全部"); };
      container.appendChild(allBtn);
      Array.from(tags).forEach(tag => {
        const btn = document.createElement("button");
        btn.className = "tag-btn";
        btn.innerText = tag;
        btn.onclick = () => { filterByTag(tag); setActive(tag); };
        container.appendChild(btn);
      });
    }

    function showAll() { render(problems); }
    function filterByTag(tag) { render(problems.filter(p => p.tag === tag)); }
    function render(list) {
      const div = document.getElementById("problem-list");
      div.innerHTML = "";
      list.forEach(p => {
        const item = document.createElement("div");
        item.className = "problem";
        item.innerHTML = `<strong>${p.id}. ${p.title}</strong> [${p.platform}] <span style="color:#888">${p.tag}</span>`;
        div.appendChild(item);
      });
    }
    function setActive(text) {
      document.querySelectorAll(".tag-btn").forEach(btn => {
        btn.classList.remove("active");
        if (btn.innerText === text) btn.classList.add("active");
      });
    }

    buildTags();
    showAll();
  </script>
</body>
</html>
